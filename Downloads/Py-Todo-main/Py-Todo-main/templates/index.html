<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Smart To-Do Manager Pro</title>
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/script.js"></script>
  <meta name="color-scheme" content="light dark">
</head>
<body>
  <div class="app">
    <main class="container">
      <header class="top">
        <div>
          <h1>Smart To-Do Manager Pro</h1>
          <p class="muted">Organize tasks — stay focused.</p>
        </div>
        <div class="right">
          <div id="clock" class="muted">--</div>
          <button id="theme-toggle" class="icon">🌙</button>
        </div>
      </header>

      <section class="card add-card">
        <form id="addForm" action="/add" method="post" class="add-form">
          <input name="name" placeholder="Task name" required>
          <div class="row">
            <input name="due_date" type="date">
            <input name="due_time" type="time">
            <select name="priority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
            <button type="submit" class="btn primary">Add</button>
          </div>
        </form>
      </section>

      <section class="card tasks-card">
        {% if tasks %}
        <div class="tasks-list">
          {% for t in tasks %}
          <article class="task-card {% if t.done %}done{% endif %} {% if t.overdue %}overdue{% endif %}" data-id="{{ t.id }}" data-due="{% if t.due_date %}{{ t.due_date }} {{ t.due_time or '' }}{% endif %}">
            <div class="left">
              <div class="title">{{ t.name }}</div>
              <div class="meta">{{ t.due_date or 'No date' }} {{ t.due_time or '' }}</div>
            </div>
            <div class="right">
              <span class="badge {{ t.priority | lower }}">{{ t.priority }}</span>
              <div class="actions">
                {% if not t.done %}
                <button class="btn small done-btn" data-id="{{ t.id }}">Mark Done</button>
                {% endif %}
                <button class="btn small danger del-btn" data-id="{{ t.id }}">Delete</button>
              </div>
            </div>
          </article>
          {% endfor %}
        </div>
        {% else %}
        <p class="muted">No tasks yet — add one using the form above.</p>
        {% endif %}
      </section>

      <footer class="muted center"></footer>
    </main>
  </div>
  <template id="task-template">
    <article class="task-card" data-id="">
      <div class="left">
        <div class="title"></div>
        <div class="meta"></div>
      </div>
      <div class="right">
        <span class="badge"></span>
        <div class="actions">
          <button class="btn small done-btn">Mark Done</button>
          <button class="btn small danger del-btn">Delete</button>
        </div>
      </div>
    </article>
  </template>
</body>
</html>
